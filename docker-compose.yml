# Face-Based Attendance System - Docker Compose
# Production and development configurations

version: '3.8'

services:
  # ===========================================================================
  # Backend API Service
  # ===========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: face-attendance-backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - MODEL_PATH=/app/models/exported/mobilefacenet.onnx
      - EMBEDDINGS_DIR=/app/data/enrollments
      - ATTENDANCE_LOG_DIR=/app/data/attendance
      - USE_GPU=false
    volumes:
      - ./data/enrollments:/app/data/enrollments
      - ./data/attendance:/app/data/attendance
      - ./models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - face-attendance-network

  # ===========================================================================
  # Frontend Service (Next.js)
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: face-attendance-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - face-attendance-network

  # ===========================================================================
  # Nginx Reverse Proxy (Production)
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: face-attendance-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - face-attendance-network
    profiles:
      - production

networks:
  face-attendance-network:
    driver: bridge

volumes:
  enrollments_data:
  attendance_data:

# ===========================================================================
# Development Override (docker-compose.override.yml or -f)
# ===========================================================================
# To run in development mode:
# docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
